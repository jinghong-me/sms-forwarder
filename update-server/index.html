<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短信转发助手 - 版本管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .version-list {
            list-style: none;
        }
        
        .version-item {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        
        .version-item:hover {
            border-color: #667eea;
        }
        
        .version-item.latest {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        
        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .version-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .version-badge {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .version-meta {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .version-meta span {
            margin-right: 20px;
        }
        
        .version-changelog {
            color: #444;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .version-actions {
            display: flex;
            gap: 10px;
        }
        
        .version-actions a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .version-actions a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .file-size {
            color: #666;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 短信转发助手 - 版本管理</h1>
            <p>管理应用版本发布，用户可以通过 App 自动检测更新</p>
        </div>
        
        <div id="alert"></div>
        
        <div class="card">
            <h2>
                <span>⬆️</span>
                上传新版本
            </h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入管理员密码" required>
                </div>
                <div class="form-group">
                    <label>APK 文件</label>
                    <input type="file" id="apk" name="apk" accept=".apk" required>
                    <p style="font-size: 12px; color: #666; margin-top: 5px;">
                        文件名格式：<code>sms-forwarder-v2.6.4.apk</code>
                    </p>
                </div>
                <div class="form-group">
                    <label>更新日志</label>
                    <textarea id="changelog" name="changelog" placeholder="请输入更新内容，支持换行"></textarea>
                </div>
                <button type="submit" class="btn">上传发布</button>
            </form>
        </div>
        
        <div class="card">
            <h2>
                <span>📦</span>
                版本列表
            </h2>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
            <div id="versionList"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'api.php';
        
        function showAlert(message, type = 'success') {
            const alertDiv = document.getElementById('alert');
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 5000);
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        async function loadVersions() {
            const loading = document.getElementById('loading');
            const versionList = document.getElementById('versionList');
            
            loading.style.display = 'block';
            versionList.innerHTML = '';
            
            try {
                const response = await fetch(`${API_BASE}?action=list`);
                const result = await response.json();
                
                loading.style.display = 'none';
                
                if (!result.success) {
                    versionList.innerHTML = `<div class="empty-state"><div class="empty-state-icon">😕</div><p>${result.error}</p></div>`;
                    return;
                }
                
                const versions = result.data;
                if (versions.length === 0) {
                    versionList.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📦</div><p>暂无版本，请上传第一个版本</p></div>`;
                    return;
                }
                
                let html = '<ul class="version-list">';
                versions.forEach((version, index) => {
                    const isLatest = index === 0;
                    html += `
                        <li class="version-item ${isLatest ? 'latest' : ''}">
                            <div class="version-header">
                                <div>
                                    <span class="version-name">v${version.versionName}</span>
                                    ${isLatest ? '<span class="version-badge">最新版本</span>' : ''}
                                </div>
                                <div class="version-actions">
                                    <a href="apks/${version.apkFile}" download>下载</a>
                                    <a href="#" onclick="deleteVersion('${version.versionName}'); return false;" style="color: #ef4444;">删除</a>
                                </div>
                            </div>
                            <div class="version-meta">
                                <span class="file-size">文件大小: ${formatFileSize(version.fileSize)}</span>
                                <span>发布时间: ${version.releaseDate}</span>
                            </div>
                            ${version.changelog ? `<div class="version-changelog">${version.changelog}</div>` : ''}
                        </li>
                    `;
                });
                html += '</ul>';
                versionList.innerHTML = html;
            } catch (error) {
                loading.style.display = 'none';
                versionList.innerHTML = `<div class="empty-state"><div class="empty-state-icon">😵</div><p>加载失败: ${error.message}</p></div>`;
            }
        }
        
        async function deleteVersion(versionName) {
            if (!confirm(`确定要删除版本 v${versionName} 吗？此操作不可恢复！`)) {
                return;
            }
            
            const password = prompt('请输入管理员密码:');
            if (!password) {
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('password', password);
                formData.append('versionName', versionName);
                
                const response = await fetch(`${API_BASE}?action=delete`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('版本删除成功！');
                    loadVersions();
                } else {
                    showAlert('删除失败: ' + result.error, 'error');
                }
            } catch (error) {
                showAlert('删除失败: ' + error.message, 'error');
            }
        }
        
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            btn.disabled = true;
            btn.textContent = '上传中...';
            
            try {
                const response = await fetch(`${API_BASE}?action=upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert('版本发布成功！');
                    e.target.reset();
                    loadVersions();
                } else {
                    showAlert('上传失败: ' + result.error, 'error');
                }
            } catch (error) {
                showAlert('上传失败: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
        
        loadVersions();
    </script>
</body>
</html>
