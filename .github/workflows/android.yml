name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        continue-on-error: true

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace || gradle assembleDebug --stacktrace
        continue-on-error: true

      - name: List APK files
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload APK if exists
        uses: actions/upload-artifact@v4
        with:
          name: sms-forwarder-debug
          path: |
            **/*.apk
            **/build/outputs/apk/**/*.apk
        continue-on-error: true
