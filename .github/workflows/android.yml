name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        continue-on-error: true

      - name: Build with Gradle (using wrapper if available)
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          else
            gradle assembleDebug --stacktrace 2>&1 | tee build.log
          fi
        continue-on-error: true

      - name: Check build status
        run: |
          if grep -q "BUILD SUCCESSFUL" build.log; then
            echo "Build succeeded"
            exit 0
          else
            echo "Build failed"
            cat build.log | tail -100
            exit 1
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: List APK files
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: sms-forwarder-debug
          path: app/build/outputs/apk/debug/*.apk
